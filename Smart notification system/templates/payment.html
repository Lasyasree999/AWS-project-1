<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .payment-card { background: white; width: 100%; max-width: 500px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #3182ce; color: white; padding: 25px; text-align: center; }
        .header h2 { margin: 0; font-size: 24px; }
        .event-details { padding: 25px; background: #ebf8ff; border-bottom: 1px solid #bee3f8; }
        .event-details p { margin: 5px 0; color: #2c5282; font-size: 16px; display: flex; justify-content: space-between; }
        .total-price { font-size: 22px !important; font-weight: bold; border-top: 2px dashed #90cdf4; padding-top: 10px; margin-top: 10px !important; }
        form { padding: 25px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; color: #4a5568; font-size: 14px; }
        input { margin-bottom: 20px; padding: 12px; border: 1px solid #cbd5e0; border-radius: 5px; font-size: 15px; }
        .row { display: flex; gap: 15px; }
        .row div { flex: 1; display: flex; flex-direction: column; }
        button { background-color: #38a169; color: white; padding: 15px; border: none; border-radius: 5px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #2f855a; }
        .cancel { text-align: center; margin-top: 15px; display: block; color: #718096; text-decoration: none; font-size: 14px; }
        .cancel:hover { color: #e53e3e; }
    </style>
</head>
<body>
    <div class="payment-card">
        <div class="header">
            <h2>Secure Checkout</h2>
        </div>
        
        <div class="event-details">
            <p><span>Event:</span> <strong>{{ event.event_name }}</strong></p>
            <p><span>Date:</span> <strong>{{ event.event_date }}</strong></p>
            <p class="total-price"><span>Total to Pay:</span> <span>${{ event.price }}</span></p>
        </div>

        <form action="/process_payment" method="POST">
            <!-- Hidden fields to pass data to backend securely -->
            <input type="hidden" name="event_id" value="{{ event.event_id }}">
            <input type="hidden" name="event_name" value="{{ event.event_name }}">
            <input type="hidden" name="price" value="{{ event.price }}">

            <label for="card_name">Name on Card</label>
            <input type="text" id="card_name" required placeholder="John Doe">
            
            <label for="card_number">Card Number (Mock Data only)</label>
            <input type="text" id="card_number" name="card_number" required placeholder="1234 5678 9101 1121" maxlength="19">
            
            <div class="row">
                <div>
                    <label for="expiry">Expiry Date</label>
                    <input type="text" id="expiry" required placeholder="MM/YY">
                </div>
                <div>
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" required placeholder="123" maxlength="3">
                </div>
            </div>
            
            <button type="submit">Pay ${{ event.price }} & Book Ticket</button>
            <a href="/user_dashboard" class="cancel">Cancel and return to dashboard</a>
        </form>
    </div>
</body>
</html>
