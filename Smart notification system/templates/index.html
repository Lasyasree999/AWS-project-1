<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Notification System</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: #f0f4f8; color: #333; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #1a202c; padding: 20px 40px; color: white; }
        .navbar h2 { margin: 0; font-size: 24px; }
        .navbar .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; background: #2d3748; padding: 10px 20px; border-radius: 5px; transition: 0.3s; }
        .navbar .nav-links a:hover { background: #4a5568; }
        .hero { text-align: center; padding: 100px 20px; }
        .hero h1 { font-size: 48px; color: #2d3748; margin-bottom: 20px; }
        .hero p { font-size: 20px; color: #4a5568; max-width: 600px; margin: 0 auto; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>AWS Event System</h2>
        <div class="nav-links">
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </div>
    </div>

    <div class="hero">
        <h1>Welcome to Smart Events</h1>
        <p>Book tickets for your favorite events, manage your bookings, and get instant SNS notifications. Powered securely by AWS DynamoDB, EC2, and IAM.</p>
    </div>
</body>
</html>
